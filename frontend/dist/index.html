<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Collaborative Editor</title>
    <script>
      (function () {
        try {
          var k = 'collab-editor-theme';
          var t = localStorage.getItem(k);
          var theme =
            t === 'light' || t === 'dark'
              ? t
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.classList.add(theme);
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <script type="module" crossorigin src="/assets/index-DqjmpN-E.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-sagDJDEf.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
